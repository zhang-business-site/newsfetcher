services:
  newsfetcher:
    # 本地开发时用 build: . ，生产环境用 image
    image: ghcr.io/${GH_REPO:-ruziyi/newsfetcher}:latest
    build: .
    container_name: newsfetcher
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - FETCH_INTERVAL_MINUTES=30
    volumes:
      - ./articles.db:/app/articles.db
    restart: unless-stopped
